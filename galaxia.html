<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primer Mes Corazón 🩷</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; font-family: 'Press Start 2P', cursive; }
        
        .ui {
            position: absolute; width: 100%; text-align: center;
            color: white; pointer-events: none; top: 5%; z-index: 10;
        }
        
        h1 { 
            font-size: 1.5rem;
            background: linear-gradient(to right, #fff, #ff77ff, #77ffff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(255,100,200,0.9));
        }

        /* --- ESTILO DEL BOTÓN ROSA BONITO --- */
        .btn-regresar {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100; /* Para que esté por encima de todo */
            padding: 12px 20px;
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            color: white;
            background: rgba(255, 105, 180, 0.2); /* Rosa translúcido */
            border: 2px solid #ff69b4;
            border-radius: 12px;
            cursor: pointer;
            text-decoration: none;
            backdrop-filter: blur(8px); /* Efecto cristal empañado */
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(255, 105, 180, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-regresar:hover {
            background: rgba(255, 105, 180, 0.6);
            box-shadow: 0 0 25px rgba(255, 105, 180, 0.8);
            transform: scale(1.1);
            border-color: #fff;
        }
    </style>
</head>
<body>

    <a href="index.html" class="btn-regresar">◀ VOLVER</a>

    <div class="ui">
        <h1>Primer Mes Corazon🩷</h1>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        let scene, camera, renderer, controls, vortexGroup, kirbyPlanet, spaceBackground;
        let miniPlanets = [];

        const frases = [
            "12 de febrero del 2026 empezó nuestra historia 💗",
            "Gracias por escucharme cuando más lo necesitaba",
            "Eres alguien muy especial para mí Arlette",
            "Un mes contigo y ya eres muy importante en mi vida",
            "Gracias por estar para mí siempre"
        ];

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 5000);
            camera.position.set(0, 15, 50);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.outputEncoding = THREE.sRGBEncoding;
            document.body.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 0.5;

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const light = new THREE.PointLight(0xffffff, 1);
            light.position.set(20, 20, 20);
            scene.add(light);

            const loader = new THREE.GLTFLoader();
            loader.load('../fondo.glb', function(gltf) {
                spaceBackground = gltf.scene;
                spaceBackground.scale.set(600, 600, 600); 
                scene.add(spaceBackground);
            }, undefined, function(e) { console.error("Error cargando fondo:", e); });

            createVortex(); 
            createHeart();
            createKirbyPlanet(); 
            createMiniPlanets(); 

            animate();
        }

        function createTextTexture(text) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            canvas.width = 3000; 
            canvas.height = 300;
            
            ctx.imageSmoothingEnabled = false;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = 'white';
            ctx.font = '45px "Press Start 2P"'; 
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            ctx.shadowColor = "#ff00ee";
            ctx.shadowBlur = 20;
            
            ctx.fillText(text, 1500, 150);
            
            const texture = new THREE.CanvasTexture(canvas);
            texture.magFilter = THREE.NearestFilter;
            texture.minFilter = THREE.NearestFilter;
            return texture;
        }

        function createVortex() {
            vortexGroup = new THREE.Group();
            for (let i = 0; i < 30; i++) {
                const mat = new THREE.SpriteMaterial({ 
                    map: createTextTexture(frases[i % frases.length]),
                    transparent: true, 
                    opacity: 0.95
                });
                const sprite = new THREE.Sprite(mat);
                
                let angle = Math.random() * Math.PI * 2;
                let radius = 20 + Math.random() * 15; 
                
                sprite.position.set(
                    Math.cos(angle) * radius, 
                    (Math.random() - 0.5) * 25 - 15, 
                    Math.sin(angle) * radius
                );
                
                sprite.scale.set(60, 9, 1); 
                vortexGroup.add(sprite);
            }
            scene.add(vortexGroup);
        }

        function createHeart() {
            const count = 8000;
            const pos = new Float32Array(count * 3);
            for (let i = 0; i < count; i++) {
                let t = Math.random() * Math.PI * 2;
                let x = 16 * Math.pow(Math.sin(t), 3);
                let y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
                pos[i * 3] = (x / 4.5); 
                pos[i * 3 + 1] = (y / 4.5) + 12;
                pos[i * 3 + 2] = (Math.random() - 0.5) * 5;
            }
            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            const mat = new THREE.PointsMaterial({ size: 0.18, color: 0xff33bb, blending: THREE.AdditiveBlending });
            scene.add(new THREE.Points(geo, mat));
        }

        function createKirbyPlanet() {
            const geometry = new THREE.SphereGeometry(8, 64, 64);
            const texture = new THREE.TextureLoader().load('../kby.jpg'); 
            const material = new THREE.MeshPhongMaterial({ map: texture, shininess: 20 });
            kirbyPlanet = new THREE.Mesh(geometry, material);
            kirbyPlanet.position.set(-35, 15, -30); 
            scene.add(kirbyPlanet);
        }

        function createMiniPlanets() {
            const geometry = new THREE.SphereGeometry(2.8, 32, 32);
            const texture = new THREE.TextureLoader().load('../kby.jpg'); 
            for(let i = 0; i < 8; i++) {
                const mini = new THREE.Mesh(geometry, new THREE.MeshPhongMaterial({ map: texture }));
                const angle = (i / 8) * Math.PI * 2;
                mini.position.set(Math.cos(angle)*45, (Math.random()-0.5)*30, Math.sin(angle)*45);
                scene.add(mini);
                miniPlanets.push(mini);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            vortexGroup.rotation.y += 0.0015; 
            
            if (spaceBackground) spaceBackground.rotation.y += 0.0001;

            if (kirbyPlanet) kirbyPlanet.rotation.y += 0.005;
            miniPlanets.forEach((p, i) => {
                p.rotation.y += 0.008;
                p.position.y += Math.sin(Date.now() * 0.001 + i) * 0.04;
            });
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
